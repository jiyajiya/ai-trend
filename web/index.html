<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AX 개발팀 - AI 트렌드 · AI Trend Board</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app" id="app" data-theme="light">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">∞</div>
        <div class="brand-text">
          <div class="brand-team">AX 개발팀</div>
          <div class="brand-name">AI 트렌드</div>
        </div>
      </div>

      <nav class="feed-nav" id="feeds"></nav>

      <div class="nav-label">CATEGORY</div>
      <div class="cats" id="cats"></div>

      <button class="darktoggle" id="darktoggle"></button>
    </aside>

    <main class="main">
      <header class="main-head">
        <div class="head-left">
          <h1 class="head-title"><span id="feedTitle">뉴스</span><span class="head-count" id="feedCount">0</span></h1>
          <p class="head-sub" id="feedSub"></p>
        </div>
        <div class="search">
          <span class="search-ic">⌕</span>
          <input id="q" placeholder="제목·내용·태그 검색" />
        </div>
      </header>
      <div class="reader" id="reader"></div>
    </main>
    <aside class="panel" id="panel" data-open="false">
      <button class="panel-close" id="panelClose" aria-label="닫기">×</button>
      <div class="panel-body" id="panelBody"></div>
    </aside>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
